// ─── Average Daily Spend ───
function renderAverageDailySpend(mt) {
  const expenses = mt.filter(t => t.type === 'expense');
  if (expenses.length === 0) return '';

  const now = new Date();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const totalSpent = expenses.reduce((s, t) => s + t.amount, 0);
  const avgDaily = totalSpent / daysInMonth;

  const daysWithSpending = new Set(expenses.map(t => t.date)).size;

  const todayKey = new Date().toISOString().split('T')[0];
  const todaySpent = expenses.filter(t => t.date === todayKey).reduce((s, t) => s + t.amount, 0);

  const comparison = todaySpent > avgDaily ? 'above' : 'below';
  const diff = Math.abs(todaySpent - avgDaily);

  return `<div class="glass-card fade-up">
    <div class="avg-daily-card">
      <div class="avg-daily-row">
        <div class="avg-daily-stat">
          <div class="avg-daily-label">Avg Daily</div>
          <div class="avg-daily-value">$${fmt(avgDaily)}</div>
        </div>
        <div class="avg-daily-stat">
          <div class="avg-daily-label">Days Spent</div>
          <div class="avg-daily-value">${daysWithSpending}</div>
        </div>
      </div>
      <div class="avg-daily-trend ${comparison}">
        Today is ${Math.round(diff)} ${comparison === 'above' ? '↑' : '↓'} average
      </div>
    </div>
  </div>`;
}

// ─── Top 5 Merchants/Payees ───
function renderTopMerchants(mt) {
  const expenses = mt.filter(t => t.type === 'expense' && t.note);
  if (expenses.length === 0) return '';

  const merchants = {};
  expenses.forEach(t => {
    if (!merchants[t.note]) merchants[t.note] = { count: 0, total: 0 };
    merchants[t.note].count++;
    merchants[t.note].total += t.amount;
  });

  const sorted = Object.entries(merchants)
    .map(([name, data]) => ({ name, ...data }))
    .sort((a, b) => b.total - a.total)
    .slice(0, 5);

  if (sorted.length === 0) return '';

  return `<div class="glass-card fade-up">
    <div class="card-title">Top Merchants</div>
    ${sorted.map((m, i) => `
      <div class="merchant-rank">
        <div class="merchant-rank-num">#${i+1}</div>
        <div class="merchant-rank-info">
          <div class="merchant-rank-name">${m.name}</div>
          <div class="merchant-rank-count">${m.count} transaction${m.count !== 1 ? 's' : ''}</div>
        </div>
        <div class="merchant-rank-total">$${fmt(m.total)}</div>
      </div>
    `).join('')}
  </div>`;
}

// ─── Recurring Transaction Detection ───
function renderRecurringTransactions() {
  const monthlyExpenses = {};

  DATA.tx.filter(t => t.type === 'expense' && t.note).forEach(t => {
    const mk = monthKey(new Date(t.date));
    if (!monthlyExpenses[mk]) monthlyExpenses[mk] = {};
    monthlyExpenses[mk][t.note] = (monthlyExpenses[mk][t.note] || 0) + t.amount;
  });

  const recurring = {};
  Object.entries(monthlyExpenses).forEach(([month, expenses]) => {
    Object.entries(expenses).forEach(([note, amount]) => {
      if (!recurring[note]) recurring[note] = [];
      recurring[note].push(amount);
    });
  });

  const recurringList = Object.entries(recurring)
    .filter(([_, amounts]) => amounts.length >= 2)
    .map(([name, amounts]) => {
      const avg = amounts.reduce((s, a) => s + a, 0) / amounts.length;
      return { name, monthlyAvg: avg, count: amounts.length };
    })
    .sort((a, b) => b.monthlyAvg - a.monthlyAvg)
    .slice(0, 5);

  if (recurringList.length === 0) return '';

  return `<div class="glass-card fade-up">
    <div class="card-title">Recurring Expenses</div>
    <div class="recurring-badge">🔄 Subscription</div>
    ${recurringList.map(r => `
      <div class="recurring-item">
        <div class="recurring-name">${r.name}</div>
        <div class="recurring-cost">$${fmt(r.monthlyAvg)}/mo</div>
      </div>
    `).join('')}
  </div>`;
}

// ─── Weekly Summary ───
function renderWeeklySummary(mt) {
  const now = new Date();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const dayOfMonth = now.getDate();
  const daysLeft = daysInMonth - dayOfMonth;

  const currentDay = now.getDay();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - currentDay);

  let weekSpending = 0;
  for (let i = 0; i <= currentDay; i++) {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    const dateStr = d.toISOString().split('T')[0];
    weekSpending += mt.filter(t => t.type === 'expense' && t.date === dateStr).reduce((s, t) => s + t.amount, 0);
  }

  const todayKey = new Date().toISOString().split('T')[0];
  const todaySpent = mt.filter(t => t.type === 'expense' && t.date === todayKey).reduce((s, t) => s + t.amount, 0);

  const totalBudget = Object.values(DATA.budgets).reduce((s, b) => s + b, 0);
  const monthSpent = mt.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const monthRemaining = Math.max(0, totalBudget - monthSpent);
  const dailyBudget = daysLeft > 0 ? monthRemaining / daysLeft : 0;

  return `<div class="glass-card fade-up">
    <div class="card-title">Weekly Summary</div>
    <div class="weekly-summary-grid">
      <div class="weekly-stat-box">
        <div class="weekly-stat-label">This Week</div>
        <div class="weekly-stat-value">$${fmt(weekSpending)}</div>
      </div>
      <div class="weekly-stat-box">
        <div class="weekly-stat-label">Today</div>
        <div class="weekly-stat-value">$${fmt(todaySpent)}</div>
      </div>
      <div class="weekly-stat-box">
        <div class="weekly-stat-label">Days Left</div>
        <div class="weekly-stat-value">${daysLeft}</div>
      </div>
      <div class="weekly-stat-box accent">
        <div class="weekly-stat-label">Daily Budget</div>
        <div class="weekly-stat-value">$${fmt(dailyBudget)}</div>
      </div>
    </div>
  </div>`;
}

function renderWhatIfCalculator() {
  const whatIfAmount = parseFloat(document.getElementById('whatif-amount')?.value) || state.whatIfAmount;
  const whatIfPeriod = document.getElementById('whatif-period')?.value || state.whatIfPeriod;

  let resultsHtml = '';
  if (whatIfAmount > 0 && DATA.goals && DATA.goals.length > 0) {
    resultsHtml = `
      <div class="whatif-results">
        ${DATA.goals.map(goal => {
          const remaining = Math.max(0, goal.target - goal.saved);
          const periodDays = whatIfPeriod === 'week' ? 7 : whatIfPeriod === 'month' ? 30 : 365;
          const periodsNeeded = remaining > 0 ? Math.ceil(remaining / whatIfAmount) : 0;
          const reachDate = new Date();
          reachDate.setDate(reachDate.getDate() + periodsNeeded * periodDays);
          const dateStr = reachDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

          return `<div class="whatif-result-item">
            <span class="whatif-result-goal">${goal.emoji} ${goal.name}</span>
            <span class="whatif-result-date">${periodsNeeded === 0 ? 'Already reached!' : 'by ' + dateStr}</span>
          </div>`;
        }).join('')}
      </div>
    `;
  }

  return `
    <div class="whatif-calculator fade-up">
      <div style="font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px">What If Calculator</div>

      ${whatIfAmount <= 0 ? '<div style="text-align:center;color:var(--text3);font-size:13px;padding:10px">Enter an amount to see projections</div>' : ''}

// ─── Goal Actions ───
function openGoalModal(type) {
  if (type === 'create') {
    state.goalForm = { name: '', emoji: '🎯', target: '', deadline: '', color: '#4a7cff' };
  }
  state.goalModal = type;
  render();
  setTimeout(() => {
    if (type === 'create') {
      document.getElementById('goal-name')?.focus();
    } else {
      document.getElementById('allocate-amount')?.focus();
    }
  }, 100);
}

function closeGoalModal() {
  state.goalModal = null;
  render();
}

function openAllocateModal(goalId) {
  state.goalModal = goalId;
  render();
}

function createGoal() {
  const name = document.getElementById('goal-name')?.value?.trim() || '';
  const emoji = document.getElementById('goal-emoji')?.value?.trim() || '🎯';
  const target = parseFloat(document.getElementById('goal-target')?.value);
  const deadline = document.getElementById('goal-deadline')?.value || '';
  const color = state.goalForm.color || '#4a7cff';

  if (!name || !target || target <= 0 || !deadline) {
    toast('Fill in all fields');
    return;
  }

  const goal = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
    name,
    emoji,
    target,
    deadline,
    saved: 0,
    color,
    createdAt: new Date().toISOString(),
  };

  if (!DATA.goals) DATA.goals = [];
  DATA.goals.push(goal);

  save();
  state.goalModal = null;
  render();
  toast('Goal created! 🎯');
}

function allocateToGoal(goalId) {
  const amount = parseFloat(document.getElementById('allocate-amount')?.value);
  const note = document.getElementById('allocate-note')?.value?.trim() || '';

  if (!amount || amount <= 0) {
    toast('Enter an amount');
    return;
  }

  const goal = DATA.goals.find(g => g.id === goalId);
  if (!goal) return;

  const oldPct = (goal.saved / goal.target) * 100;
  goal.saved += amount;
  const newPct = (goal.saved / goal.target) * 100;

  if (!DATA.allocations) DATA.allocations = [];
  DATA.allocations.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
    goalId,
    amount,
    date: new Date().toISOString(),
    note,
  });

  save();

  // Celebrate milestones
  const milestones = [25, 50, 75, 100];
  for (const ms of milestones) {
    if (oldPct < ms && newPct >= ms) {
      celebrateMilestone(goal, ms);
      break;
    }
  }

  state.goalModal = null;
  render();
  toast(`Allocated $${fmt(amount)} to ${goal.name}!`);
}

function deleteGoal(goalId) {
  if (!confirm('Delete this goal? This cannot be undone.')) return;
  DATA.goals = DATA.goals.filter(g => g.id !== goalId);
  DATA.allocations = DATA.allocations.filter(a => a.goalId !== goalId);
  save();
  render();
  toast('Goal deleted');
}

function celebrateMilestone(goal, milestone) {
  const messages = {
    25: '25% there! Keep going! 💪',
    50: 'Halfway! You\'re crushing it! 🔥',
    75: '75%! Almost there! 🚀',
    100: 'Goal achieved! You did it! 🎉',
  };

  const toastEl = document.createElement('div');
  toastEl.className = 'celebration-toast show';
  toastEl.textContent = messages[milestone] || `${milestone}% reached!`;
  document.body.appendChild(toastEl);

  // Confetti for 100%
  if (milestone === 100) {
    const confettiContainer = document.createElement('div');
    confettiContainer.className = 'confetti-animation';
    document.body.appendChild(confettiContainer);

    const emojis = ['🎉', '🎊', '✨', '🌟', '🎯'];
    for (let i = 0; i < 20; i++) {
      const confetti = document.createElement('div');
      confetti.className = 'confetti-emoji';
      confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.top = '50%';
      confetti.style.animationDelay = Math.random() * 0.3 + 's';
      confettiContainer.appendChild(confetti);
    }

    setTimeout(() => confettiContainer.remove(), 2300);
  }

  setTimeout(() => toastEl.remove(), 2200);
}

function renderModal() {
  if (!state.modal) return `<div class="modal-overlay" id="modal"></div>`;
  const isIncome = state.modal === 'income';

  // Show custom category form if in creation mode
  if (state.showCreateCustomCat && !isIncome) {
    return `<div class="modal-overlay open" id="modal" onclick="if(event.target===this)closeModal()">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">Create Category</div>

        <div class="form-group">
          <label>Emoji</label>
          <input class="form-input" type="text" id="cc-emoji" placeholder="e.g. 🎮" maxlength="2">
        </div>

        <div class="form-group">
          <label>Category Name</label>
          <input class="form-input" type="text" id="cc-name" placeholder="e.g. Gaming">
        </div>

        <div class="form-group">
          <label>Color</label>
          <div class="custom-cat-form">
            <div class="color-picker">
              <div class="color-opt ${state.customCatColor==='#ff6b6b'?'selected':''}" style="background:#ff6b6b" onclick="state.customCatColor='#ff6b6b';render()"></div>
              <div class="color-opt ${state.customCatColor==='#ffa726'?'selected':''}" style="background:#ffa726" onclick="state.customCatColor='#ffa726';render()"></div>
              <div class="color-opt ${state.customCatColor==='#ab47bc'?'selected':''}" style="background:#ab47bc" onclick="state.customCatColor='#ab47bc';render()"></div>
              <div class="color-opt ${state.customCatColor==='#42a5f5'?'selected':''}" style="background:#42a5f5" onclick="state.customCatColor='#42a5f5';render()"></div>
              <div class="color-opt ${state.customCatColor==='#66bb6a'?'selected':''}" style="background:#66bb6a" onclick="state.customCatColor='#66bb6a';render()"></div>
              <div class="color-opt ${state.customCatColor==='#ef5350'?'selected':''}" style="background:#ef5350" onclick="state.customCatColor='#ef5350';render()"></div>
              <div class="color-opt ${state.customCatColor==='#26c6da'?'selected':''}" style="background:#26c6da" onclick="state.customCatColor='#26c6da';render()"></div>
              <div class="color-opt ${state.customCatColor==='#78909c'?'selected':''}" style="background:#78909c" onclick="state.customCatColor='#78909c';render()"></div>
            </div>
          </div>
        </div>

        <button class="btn-primary" onclick="createCustomCategory()">Create Category</button>
        <button class="btn-cancel" onclick="state.showCreateCustomCat=false;render()">Cancel</button>
      </div>
    </div>`;
  }

  const cats = getAllCategories();
  const noteVal = document.getElementById('m-note')?.value || '';
  const autoDetected = getAutoCategory(noteVal);

  return `<div class="modal-overlay open" id="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">${isIncome ? '💵 Add Income' : '💸 Add Expense'}</div>

      <div class="form-group">
        <label>Amount</label>
        <div class="amount-input-wrap">
          <span class="currency-prefix">$</span>
          <input class="form-input" type="number" id="m-amount" placeholder="0.00" inputmode="decimal" step="0.01" min="0">
        </div>
      </div>

      ${!isIncome ? `
      <div class="form-group">
        <label>Category</label>
        <div class="category-grid">
          ${cats.map(c => `
            <div class="cat-btn ${state.selectedCat===c.id?'selected':''}" onclick="state.selectedCat='${c.id}';state.selectedSubCat='';render();setTimeout(()=>document.getElementById('m-amount')?.focus(),50)" style="${c.id && !CATEGORIES.find(bc => bc.id === c.id) ? 'border-color:rgba(255,107,53,0.4);background:rgba(255,107,53,0.08)' : ''}">
              <span class="emoji">${c.emoji}</span>
              <span class="cname">${c.name}</span>
            </div>
          `).join('')}
          <div class="cat-btn" onclick="state.showCreateCustomCat=true;render()" style="opacity:0.6">
            <span class="emoji" style="font-size:20px">+</span>
            <span class="cname">Add</span>
          </div>
        </div>
      </div>

      ${state.selectedCat && (SUB_CATEGORIES[state.selectedCat] || []).length > 0 ? `
      <div class="form-group">
        <label>Subcategory</label>
        <div class="sub-category-chips">
          ${(SUB_CATEGORIES[state.selectedCat] || []).map(sub => `
            <div class="sub-cat-chip ${state.selectedSubCat===sub?'selected':''}" onclick="state.selectedSubCat='${sub}';render()">
              ${sub}
            </div>
          `).join('')}
        </div>
      </div>
      ` : ''}
      ` : ''}

      <div class="form-group">
        <label>What was it for?</label>
        <input class="form-input" type="text" id="m-note" placeholder="${isIncome ? 'e.g. Salary, freelance...' : 'e.g. Lunch, Uber, Netflix...'}" oninput="render()">
        ${!isIncome && autoDetected ? `<div class="auto-detect-hint">Auto-detected: ${getCat(autoDetected).emoji} ${getCat(autoDetected).name}</div>` : ''}
      </div>

      <div class="form-group">
        <label>Date</label>
        <input class="form-input" type="date" id="m-date" value="${todayKey()}">
      </div>

      <button class="btn-primary ${isIncome?'blue':''}" onclick="addTransaction()">
        ${isIncome ? 'Add Income' : 'Add Expense'}
      </button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════
function switchTab(t) { state.tab = t; render(); }

function openModal(type) {
  state.modal = type;
  state.selectedCat = '';
  state.selectedSubCat = '';
  state.customCatColor = '#ff6b6b';
  render();
  setTimeout(() => document.getElementById('m-amount')?.focus(), 100);
}

function closeModal() {
  state.modal = null;
  render();
}

function addTransaction() {
  const amount = parseFloat(document.getElementById('m-amount')?.value);
  const note = document.getElementById('m-note')?.value?.trim() || '';
  const date = document.getElementById('m-date')?.value || todayKey();
  const type = state.modal;

  if (!amount || amount <= 0) { toast('Enter an amount'); return; }
  if (type === 'expense' && !state.selectedCat) { toast('Pick a category'); return; }

  const catId = type === 'income' ? 'other' : (state.selectedCat || getAutoCategory(note));

  const tx = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
    type,
    amount,
    category: catId,
    note,
    date,
  };

  if (state.selectedSubCat) tx.subcategory = state.selectedSubCat;

  DATA.tx.push(tx);

  save();
  state.modal = null;
  state.selectedSubCat = '';
  state.tab = 'home';
  render();
  toast(type === 'income' ? 'Income added!' : 'Expense added!');
}

function createCustomCategory() {
  const emoji = document.getElementById('cc-emoji')?.value?.trim() || '';
  const name = document.getElementById('cc-name')?.value?.trim() || '';
  const color = state.customCatColor || '#ff6b6b';

  if (!emoji || !name) { toast('Enter emoji and name'); return; }

  if (!DATA.customCategories) DATA.customCategories = [];

  const id = 'custom_' + Date.now();
  DATA.customCategories.push({ id, emoji, name, color });

  save();
  state.showCreateCustomCat = false;
  state.selectedCat = id;
  state.customCatColor = '';
  render();
  toast('Category created!');
}

function deleteTx(id) {
  deleteTxWithUndo(id);
}

function setBudget(catId) {
  const inp = document.getElementById('b-' + catId);
  const val = parseFloat(inp?.value);
  if (!val || val <= 0) { delete DATA.budgets[catId]; }
  else { DATA.budgets[catId] = val; }
  save();
  render();
  toast('Budget set!');
}

// ─── Service Worker ───
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ─── Init ───
applyTheme();
render();
</script>
</body>
</html>
